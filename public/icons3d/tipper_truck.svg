<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dump truck / Tipper - open-top bed tilted, construction yellow -->
  <defs>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Chassis -->
  <rect x="10" y="82" width="108" height="8" rx="3" fill="#374151"/>
  <!-- Rear wheels -->
  <circle cx="30" cy="96" r="12" fill="#1f2937"/>
  <circle cx="30" cy="96" r="6" fill="#6b7280"/>
  <!-- Front wheels -->
  <circle cx="100" cy="96" r="12" fill="#1f2937"/>
  <circle cx="100" cy="96" r="6" fill="#6b7280"/>
  <!-- Tipper bed (tilted open-top) -->
  <polygon points="12,80 12,38 72,38 72,80" fill="url(#bed)" stroke="#92400e" stroke-width="2"/>
  <!-- Open top indicator - no top cover -->
  <line x1="12" y1="38" x2="72" y2="38" stroke="#92400e" stroke-width="3"/>
  <!-- Bed side ribs -->
  <line x1="32" y1="38" x2="32" y2="80" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="38" x2="52" y2="80" stroke="#92400e" stroke-width="1.5" opacity="0.5"/>
  <!-- Cab -->
  <rect x="74" y="48" width="40" height="34" rx="6" fill="url(#cab)" stroke="#92400e" stroke-width="2"/>
  <!-- Cab window -->
  <rect x="80" y="52" width="28" height="16" rx="3" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- Headlight -->
  <rect x="112" y="70" width="6" height="6" rx="2" fill="#fef08a"/>
  <!-- Exhaust pipe -->
  <rect x="72" y="36" width="4" height="16" rx="2" fill="#4b5563"/>
</svg>