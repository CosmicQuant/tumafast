<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Tanker truck - cab + cylindrical tank -->
  <defs>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="tcab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="tankshine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Chassis -->
  <rect x="6" y="82" width="116" height="7" rx="3" fill="#374151"/>
  <!-- Rear wheels (dual) -->
  <circle cx="22" cy="96" r="11" fill="#1f2937"/>
  <circle cx="22" cy="96" r="5" fill="#6b7280"/>
  <circle cx="42" cy="96" r="11" fill="#1f2937"/>
  <circle cx="42" cy="96" r="5" fill="#6b7280"/>
  <!-- Front wheels -->
  <circle cx="104" cy="96" r="11" fill="#1f2937"/>
  <circle cx="104" cy="96" r="5" fill="#6b7280"/>
  <!-- Tank cylinder -->
  <rect x="10" y="40" width="70" height="42" rx="21" fill="url(#tank)" stroke="#64748b" stroke-width="2"/>
  <!-- Tank shine/highlight -->
  <rect x="14" y="42" width="62" height="14" rx="7" fill="url(#tankshine)"/>
  <!-- Tank bands -->
  <rect x="28" y="38" width="3" height="46" rx="1" fill="#64748b" opacity="0.4"/>
  <rect x="52" y="38" width="3" height="46" rx="1" fill="#64748b" opacity="0.4"/>
  <!-- Tank end caps (elliptical) -->
  <ellipse cx="10" cy="61" rx="4" ry="18" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <ellipse cx="80" cy="61" rx="4" ry="18" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <!-- Top hatch -->
  <rect x="38" y="34" width="12" height="8" rx="3" fill="#475569" stroke="#334155" stroke-width="1"/>
  <!-- Hazmat diamond -->
  <polygon points="45,52 52,59 45,66 38,59" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  <text x="45" y="61" text-anchor="middle" dominant-baseline="central" fill="white" font-size="7" font-weight="bold">!</text>
  <!-- Cab -->
  <rect x="82" y="44" width="38" height="38" rx="6" fill="url(#tcab)" stroke="#71717a" stroke-width="2"/>
  <!-- Cab window -->
  <rect x="88" y="48" width="26" height="16" rx="3" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- Headlight -->
  <rect x="118" y="68" width="5" height="6" rx="2" fill="#fef08a"/>
  <!-- Cab-tank connector -->
  <rect x="80" y="60" width="4" height="22" rx="1" fill="#4b5563"/>
</svg>